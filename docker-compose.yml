version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hisn-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hisn-net

  redis:
    image: redis:7
    container_name: hisn-redis
    ports:
      - "6379:6379"
    networks:
      - hisn-net

  kong-database:
    image: postgres:15
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_pass
    networks:
      - hisn-net

  kong-migration:
    image: kong:latest
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
    depends_on:
      - kong-database
    networks:
      - hisn-net

  kong:
    image: kong:latest
    container_name: hisn-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - kong-migration
    networks:
      - hisn-net

  sanctions-service:
    build: ./services/sanctions-service
    container_name: hisn-sanctions
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8002:8000"
    depends_on:
      - postgres
    networks:
      - hisn-net

networks:
  hisn-net:
    driver: bridge

volumes:
  pgdata:
